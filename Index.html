<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MDD Tracker</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding:40px;">
  <h1>QQQ MDD Tracker</h1>

  <p>최고가</p>
  <input id="peak" type="number" value="540">

  <p>현재가</p>
  <input id="current" type="number" value="432">

  <h2 id="result">MDD: -20%</h2>

  <button onclick="calc()">계산</button>

  <script>
    function calc(){
      let peak = document.getElementById('peak').value;
      let current = document.getElementById('current').value;

      let mdd = ((current - peak) / peak * 100).toFixed(2);
      document.getElementById('result').innerText = "MDD: " + mdd + "%";
    }
  </script>
</body>
</html>
